<button class="theme-toggle" aria-label="切換深淺色模式" onclick="(function(b){var c=document.documentElement.getAttribute('data-theme');var n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);b.innerHTML=n==='dark'?'☀️':'🌙';})(this)">
<script>document.write(localStorage.getItem('theme')==='dark'?'☀️':'🌙')</script>
</button>
