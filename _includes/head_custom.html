<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ===== 全域：無圓角 ===== */
* { border-radius: 0 !important; }

/* ===== Light mode ===== */
:root {
  --bg: #faf9f5;
  --bg-sidebar: #f4f3ee;
  --text: #000;
  --link: #c15f3c;
  --link-hover: #a8502f;
  --border: #e8e6dc;
  --code-bg: #1e1e1e;
  --code-text: #d4d4d4;
  --inline-code-bg: #f4f3ee;
}

/* ===== Dark mode ===== */
[data-theme="dark"] {
  --bg: #1a1a1a;
  --bg-sidebar: #222;
  --text: #e0ddd5;
  --link: #e08860;
  --link-hover: #f0a070;
  --border: #3a3a3a;
  --code-bg: #0d0d0d;
  --code-text: #d4d4d4;
  --inline-code-bg: #2a2a2a;
}

/* ===== Font ===== */
body, .site-title, .nav-list, .search-input {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif !important;
}

/* ===== Base ===== */
body, .main-content, .main-content-wrap, .main, #top, .main-header {
  background-color: var(--bg) !important;
  color: var(--text) !important;
}
.site-title { font-size: 1rem !important; white-space: nowrap; font-weight: 700; color: var(--text) !important; }

/* ===== 所有文字：淺色黑字，深色淺字 ===== */
h1, h2, h3, h4, p, li, td, th, strong, b,
.fs-9, .fs-8, .fs-6, .fs-5, .fw-300 { color: var(--text) !important; }

/* ===== Links ===== */
a { color: var(--link) !important; }
a:hover { color: var(--link-hover) !important; }

/* ===== Sidebar：純色背景 + 框線分隔 ===== */
.side-bar { background-color: var(--bg-sidebar) !important; background-image: none !important; border-right: 1px solid var(--border); }
.site-header { border-bottom: 1px solid var(--border); }
.nav-list .nav-list-item a { color: var(--text) !important; }
.nav-list .nav-list-item a:hover { color: var(--link) !important; }
.nav-list .nav-list-item.active > .nav-list-link {
  color: var(--link) !important; font-weight: 700;
  background-color: transparent !important;
  background-image: none !important;
  border-left: 2px solid var(--link) !important;
}
.nav-list-expander { color: var(--text) !important; }
[data-theme="dark"] .nav-list .nav-list-item a { color: #ccc !important; }
[data-theme="dark"] .nav-list .nav-list-item.active > .nav-list-link { color: var(--link) !important; }

/* ===== 右側主內容：無框線 ===== */
.main-content table, .main-content .table-wrapper table { border: none !important; }
.main-content table th, .main-content table td { border: none !important; border-bottom: 1px solid var(--border) !important; }
.main-content hr { border: none !important; border-bottom: 1px solid var(--border) !important; }
.main-content .highlight, .main-content .highlighter-rouge { border: none !important; }

/* ===== Buttons ===== */
.btn-primary, .btn-primary:hover, .btn-primary:active, a.btn-primary, a.btn-primary:hover {
  background-color: var(--link) !important;
  background-image: none !important;
  border-color: var(--link) !important;
  box-shadow: none !important;
  color: #fff !important;
  text-decoration: none !important;
  font-weight: 500;
}
.btn-primary:hover, a.btn-primary:hover {
  background-color: var(--link-hover) !important;
  border-color: var(--link-hover) !important;
}
.btn, a.btn {
  border: 2px solid var(--link) !important;
  background-color: transparent !important;
  background-image: none !important;
  box-shadow: none !important;
  color: var(--link) !important;
  text-decoration: none !important;
  font-weight: 500;
}
.btn:hover, a.btn:hover {
  background-color: var(--link) !important;
  color: #fff !important;
}

/* ===== Search ===== */
.main-header { padding-right: 0 !important; }
.search { width: 100% !important; padding: 0 !important; margin: 0 !important; }
.search-input-wrap { width: 100% !important; margin: 0 !important; }
.search-input {
  width: 100% !important;
  box-sizing: border-box !important;
  background-color: var(--bg-sidebar) !important;
  border: 1px solid var(--border) !important;
  color: var(--text) !important;
}
.search-input:focus { border-color: var(--link) !important; box-shadow: none !important; }

/* ===== Code ===== */
/* inline code：淺灰底黑字（必須比 .highlighter-rouge 優先級高） */
code,
code.language-plaintext,
code.language-plaintext.highlighter-rouge,
.main-content code {
  background-color: #eee !important;
  color: #000 !important;
  border: none !important;
  padding: 1px 3px;
  font-size: 0.85em;
}
[data-theme="dark"] code,
[data-theme="dark"] code.language-plaintext,
[data-theme="dark"] code.language-plaintext.highlighter-rouge,
[data-theme="dark"] .main-content code {
  background-color: #333 !important;
  color: #e0ddd5 !important;
}

/* code block（<pre> 包的才是 block） */
pre.highlight, .highlight pre, .highlight,
div.highlighter-rouge,
div.language-plaintext.highlighter-rouge {
  background-color: var(--code-bg) !important;
  border: none !important;
  padding: 16px 20px !important;
  overflow-x: auto;
}
div.highlighter-rouge .highlight { padding: 0 !important; }
pre.highlight code, .highlight pre code, pre code {
  background-color: transparent !important;
  color: var(--code-text) !important;
  border: none !important;
  padding: 0 !important;
  font-size: 1em;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ===== Tables：白底黑字，無例外 ===== */
.main-content table th,
.main-content table td,
.main-content .table-wrapper th,
.main-content .table-wrapper td,
.table-wrapper th,
.table-wrapper td,
table th, table td,
th, td {
  color: #000 !important;
  border-color: var(--border) !important;
}
.main-content table th, .table-wrapper th,
th { background-color: var(--bg-sidebar) !important; font-weight: 700; color: #000 !important; }
.main-content table td, .table-wrapper td,
td { background-color: #fff !important; color: #000 !important; }
[data-theme="dark"] .main-content table th,
[data-theme="dark"] .table-wrapper th,
[data-theme="dark"] th { background-color: #333 !important; color: #e0ddd5 !important; }
[data-theme="dark"] .main-content table td,
[data-theme="dark"] .table-wrapper td,
[data-theme="dark"] td { background-color: #2a2a2a !important; color: #ccc !important; }

/* ===== Footer ===== */
.site-footer { border-top: 1px solid var(--border); color: #999; background-color: var(--bg-sidebar) !important; }

/* ===== Theme toggle ===== */
.theme-toggle {
  position: fixed; top: 12px; right: 16px; z-index: 99999;
  width: 40px; height: 40px;
  background: #fff; color: #000;
  border: 0 !important; border-width: 0 !important; outline: none;
  cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: none;
}
.theme-toggle:hover { background: #eee; }
[data-theme="dark"] .theme-toggle { background: #333; color: #fff; }
[data-theme="dark"] .theme-toggle:hover { background: #444; }
</style>

<script>
(function() {
  var saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
</script>
