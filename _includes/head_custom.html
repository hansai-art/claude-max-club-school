<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ===== Light mode (default) ===== */
:root {
  --claude-orange: #d97757;
  --claude-orange-dark: #c15f3c;
  --claude-dark: #141413;
  --claude-light: #faf9f5;
  --claude-cream: #f4f3ee;
  --claude-gray: #b0aea5;
  --claude-gray-light: #e8e6dc;
  --bg: var(--claude-light);
  --bg-sidebar: var(--claude-cream);
  --text: var(--claude-dark);
  --code-bg: #1e1e1e;
  --code-text: #d4d4d4;
  --inline-code-bg: var(--claude-cream);
  --inline-code-text: var(--claude-dark);
  --border: var(--claude-gray-light);
  --table-header: var(--claude-cream);
}

/* ===== Dark mode ===== */
[data-theme="dark"] {
  --bg: #1a1a1a;
  --bg-sidebar: #222;
  --text: #e8e6dc;
  --code-bg: #0d0d0d;
  --code-text: #d4d4d4;
  --inline-code-bg: #2a2a2a;
  --inline-code-text: #e8e6dc;
  --border: #333;
  --table-header: #2a2a2a;
  --claude-cream: #2a2a2a;
  --claude-light: #1a1a1a;
  --claude-dark: #e8e6dc;
  --claude-gray-light: #333;
}

/* ===== Typography ===== */
body, .site-title, .nav-list, .search-input {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif !important;
}
body { background-color: var(--bg) !important; color: var(--text) !important; }
.site-title { font-size: 1rem !important; white-space: nowrap; font-weight: 700; color: var(--text) !important; }

/* ===== Links ===== */
a, .nav-list .nav-list-item a { color: var(--claude-orange-dark); }
a:hover { color: var(--claude-orange); }

/* ===== Sidebar ===== */
.side-bar { background-color: var(--bg-sidebar) !important; border-right: 1px solid var(--border); }
.nav-list .nav-list-item.active > .nav-list-link {
  color: var(--claude-orange-dark); font-weight: 700;
  background-color: rgba(217, 119, 87, 0.08);
}

/* ===== Buttons (kill purple gradient) ===== */
.btn-primary,
.btn-primary:hover,
.btn-primary:active,
.btn-primary.selected,
a.btn-primary,
a.btn-primary:hover {
  background-color: var(--claude-orange) !important;
  background-image: none !important;
  border-color: var(--claude-orange) !important;
  box-shadow: none !important;
  color: #fff !important;
  border-radius: 8px;
  text-decoration: none !important;
}
.btn-primary:hover,
a.btn-primary:hover {
  background-color: var(--claude-orange-dark) !important;
  border-color: var(--claude-orange-dark) !important;
}
.btn, a.btn {
  border-radius: 8px;
  border-color: var(--border);
  color: var(--claude-orange-dark) !important;
  text-decoration: none !important;
}
.btn:hover, a.btn:hover {
  color: var(--claude-orange) !important;
}

/* ===== Search bar alignment ===== */
.search {
  padding: 0 !important;
  margin: 0 !important;
}
.search-input-wrap {
  margin: 0 !important;
}
.search-input {
  width: 100% !important;
  box-sizing: border-box !important;
}

/* ===== Code blocks (FIX: text must be visible + padding) ===== */
code {
  background-color: var(--inline-code-bg) !important;
  color: var(--inline-code-text) !important;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
}
pre.highlight, .highlight pre, .highlight {
  background-color: var(--code-bg) !important;
  border-radius: 8px; border: none;
  padding: 16px 20px !important;
  overflow-x: auto;
}
pre.highlight code, .highlight pre code,
pre code {
  background-color: transparent !important;
  color: var(--code-text) !important;
  border: none;
  padding: 0 !important;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ===== Tables ===== */
th { background-color: var(--table-header) !important; border-color: var(--border) !important; font-weight: 700; color: var(--text) !important; }
td { border-color: var(--border) !important; color: var(--text) !important; }

/* ===== Search ===== */
.search-input {
  background-color: var(--bg-sidebar) !important;
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text) !important;
}
.search-input:focus { border-color: var(--claude-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.15); }

/* ===== Main content ===== */
.main-content { background-color: var(--bg) !important; color: var(--text) !important; }
h1, h2, h3, h4 { color: var(--text) !important; }
p, li, .fs-6, .fs-5, .fw-300 { color: var(--text) !important; }

/* ===== Footer ===== */
.site-footer { border-top: 1px solid var(--border); color: var(--claude-gray); background-color: var(--bg-sidebar) !important; }

/* ===== Theme toggle button (top-right) ===== */
.theme-toggle {
  position: fixed; top: 8px; right: 20px; z-index: 9999;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--claude-orange); color: #fff;
  border: none; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: background 0.2s;
}
.theme-toggle:hover { background: var(--claude-orange-dark); }
</style>

<script>
// Theme toggle
(function() {
  var saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);

  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.setAttribute('aria-label', '切換深淺色模式');
    btn.innerHTML = saved === 'dark' ? '☀️' : '🌙';
    btn.addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      btn.innerHTML = next === 'dark' ? '☀️' : '🌙';
    });
    document.body.appendChild(btn);
  });
})();
</script>
